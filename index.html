<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> </title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;cursor:none;touch-action:none}
  #fl{position:fixed;inset:0;display:block}
</style>
</head>
<body>
<canvas id="fl"></canvas>
<script>
const cv=document.getElementById('fl'), ctx=cv.getContext('2d');
let W,H,DPR=Math.min(devicePixelRatio||1,2);
let tx,ty,x,y, Rcur=120;

function makeSprite(r,g,b){
  const s=128, c=document.createElement('canvas'); c.width=c.height=s;
  const o=c.getContext('2d'), grd=o.createRadialGradient(64,64,0,64,64,64);
  grd.addColorStop(0,`rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.45,`rgba(${r},${g},${b},0.55)`);
  grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  o.fillStyle=grd; o.fillRect(0,0,s,s); return c;
}
const darkBlob=makeSprite(0,0,0), brightBlob=makeSprite(255,244,224);

/* persistent patches — fewer, softer, larger => less "cloudy", just gentle unevenness */
let cells=[];
function makeCell(){
  const ang=Math.random()*6.283, dist=Math.random()*Rcur*0.7;
  return {
    ox:Math.cos(ang)*dist, oy:Math.sin(ang)*dist,
    vx:(Math.random()-.5)*Rcur*0.0004, vy:(Math.random()-.5)*Rcur*0.0004,
    r:Rcur*(0.25+Math.random()*0.5), sx:0.7+Math.random()*0.7, sy:0.7+Math.random()*0.7,
    rot:Math.random()*6.283, spin:(Math.random()-.5)*0.0009,
    baseA:0.045+Math.random()*0.08,
    freq:0.08+Math.random()*0.30, phase:Math.random()*6.283,
    dark:Math.random()<0.6
  };
}
function initCells(){ cells=Array.from({length:34},makeCell); }

/* tiny world-space dust: floats in the air, only catches light inside the beam */
let motes=[];
function makeMote(){
  return { x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*0.05, vy:(Math.random()-.5)*0.05-0.008,  // slow, faint upward drift
    r:0.8+Math.random()*0.9,
    a:0.26+Math.random()*0.28, tf:0.8+Math.random()*2.6, tp:Math.random()*6.283 };
}
function initMotes(){ motes=Array.from({length:Math.min(180,Math.floor(W*H/6500))},makeMote); }

function resize(){
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  Rcur=Math.min(W,H)*0.0675;
  initCells(); initMotes();
}
addEventListener('resize',resize); resize();
tx=x=W/2; ty=y=H/2;

let masterOn=true, down=null;
addEventListener('pointermove',e=>{ tx=e.clientX; ty=e.clientY; });
addEventListener('pointerdown',e=>{ tx=e.clientX; ty=e.clientY; down={x:e.clientX,y:e.clientY,t:performance.now()}; });
addEventListener('pointerup',e=>{
  if(down){ const dt=performance.now()-down.t, d=Math.hypot(e.clientX-down.x,e.clientY-down.y);
    if(dt<300 && d<10){ masterOn=!masterOn; if(masterOn){ state='on'; blackoutUntil=0; } } }
  down=null;
});
addEventListener('touchmove',e=>{ if(e.touches[0]){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; } e.preventDefault(); },{passive:false});

let intensity=1, target=1, state='on', blackoutUntil=0, recovery=[], recIdx=0, recUntil=0;
function buildRecovery(){
  recovery=[{d:70,v:0},{d:55,v:.85},{d:45,v:0},{d:80,v:0},{d:40,v:1},
            {d:65,v:.12},{d:35,v:.9},{d:100,v:0},{d:45,v:1},{d:55,v:.35},{d:40,v:1}];
  recIdx=0; recUntil=performance.now()+recovery[0].d;
}
function updateFlicker(now,t){
  if(!masterOn){ intensity+=(0-intensity)*0.5; return; }
  const breathe=1+Math.sin(t*1.3)*0.014;
  if(state==='on'){
    target=breathe;
    if(Math.random()<0.05) target=breathe*(0.78+Math.random()*0.18);
    if(Math.random()<0.012) target=breathe*(0.45+Math.random()*0.25);
    if(Math.random()<0.0005){ state='black'; blackoutUntil=now+(500+Math.random()*900); }
    intensity+=(target-intensity)*0.45;
  } else if(state==='black'){
    target=Math.random()<0.06?0.04:0.0; intensity+=(target-intensity)*0.6;
    if(now>blackoutUntil){ state='recover'; buildRecovery(); }
  } else {
    target=recovery[recIdx].v; intensity+=(target-intensity)*0.7;
    if(now>recUntil){ recIdx++; if(recIdx>=recovery.length) state='on'; else recUntil=now+recovery[recIdx].d; }
  }
  if(intensity<0)intensity=0;
}

function loop(now){
  const t=now/1000;
  updateFlicker(now,t);

  x+=(tx-x)*0.16; y+=(ty-y)*0.16;
  const shx=Math.sin(t*6.1)*0.7+Math.sin(t*11.3)*0.35;
  const shy=Math.cos(t*5.4)*0.7+Math.cos(t*9.7)*0.35;
  const lx=x+shx, ly=y+shy;

  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  const I=intensity;
  if(I>0.004){
    const R=Rcur*(0.92+0.08*I);

    // ---- global illumination: a far, very faint halo that lifts the surroundings
    // so the beam bleeds into the dark instead of ending at a hard edge ----
    const HR=Rcur*5.0;
    const h=ctx.createRadialGradient(lx,ly,R*0.5, lx,ly,HR);
    h.addColorStop(0.00,`rgba(214,220,234,${0.075*I})`);
    h.addColorStop(0.16,`rgba(196,206,224,${0.042*I})`);
    h.addColorStop(0.38,`rgba(170,182,210,${0.020*I})`);
    h.addColorStop(0.62,`rgba(150,166,200,${0.008*I})`);
    h.addColorStop(0.84,`rgba(130,150,190,${0.0025*I})`);
    h.addColorStop(1.00,'rgba(120,140,180,0)');
    ctx.fillStyle=h; ctx.fillRect(0,0,W,H);

    // ---- the small focused beam: centralized soft core, dim, gentle uneven falloff ----
    const g=ctx.createRadialGradient(lx,ly,0, lx,ly,R);
    g.addColorStop(0.00,`rgba(250,242,226,${0.50*I})`);
    g.addColorStop(0.10,`rgba(249,240,222,${0.44*I})`);
    g.addColorStop(0.22,`rgba(244,236,218,${0.34*I})`);
    g.addColorStop(0.36,`rgba(230,230,222,${0.24*I})`);
    g.addColorStop(0.52,`rgba(206,212,222,${0.15*I})`);
    g.addColorStop(0.70,`rgba(176,188,212,${0.075*I})`);
    g.addColorStop(0.86,`rgba(152,168,202,${0.03*I})`);
    g.addColorStop(1.00,'rgba(120,140,180,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    for(const c of cells){
      c.ox+=c.vx; c.oy+=c.vy; c.rot+=c.spin;
      let dist=Math.hypot(c.ox,c.oy);
      if(dist>R*0.8){ c.vx-=(c.ox/dist)*Rcur*0.00003; c.vy-=(c.oy/dist)*Rcur*0.00003; }
      c.vx*=0.999; c.vy*=0.999;
      const edge=1-(dist/R)*0.7;
      const mod=0.65+0.35*Math.sin(t*c.freq+c.phase);
      const a=c.baseA*edge*mod*I;
      if(a<=0) continue;
      const w=2*c.r*c.sx, h2=2*c.r*c.sy;
      ctx.save();
      ctx.globalCompositeOperation=c.dark?'source-over':'lighter';
      ctx.globalAlpha=c.dark?a*0.7:a*0.7;
      ctx.translate(lx+c.ox,ly+c.oy); ctx.rotate(c.rot);
      ctx.drawImage(c.dark?darkBlob:brightBlob,-w/2,-h2/2,w,h2);
      ctx.restore();
    }

    // tiny dust drifting in the air, lit only where the beam reaches it
    ctx.globalCompositeOperation='lighter';
    const spill=R*1.2;
    for(const m of motes){
      const ang=(Math.sin(m.x*0.0016+t*0.12)+Math.cos(m.y*0.0016-t*0.09))*Math.PI;
      m.vx+=Math.cos(ang)*0.0018+(Math.random()-.5)*0.0016;
      m.vy+=Math.sin(ang)*0.0018+(Math.random()-.5)*0.0016-0.0013;  // gentle buoyant float
      m.vx*=0.965; m.vy*=0.965;
      const sp=Math.hypot(m.vx,m.vy); if(sp>0.16){ m.vx*=0.16/sp; m.vy*=0.16/sp; }
      m.x+=m.vx; m.y+=m.vy;
      if(m.x<0)m.x+=W; else if(m.x>W)m.x-=W;
      if(m.y<0)m.y+=H; else if(m.y>H)m.y-=H;
      const dx=m.x-lx, dy=m.y-ly, d=Math.hypot(dx,dy);
      if(d<spill){
        const f=1-d/spill, fall=Math.pow(f,0.8);
        const tw=0.7+0.3*Math.sin(t*m.tf+m.tp);
        const a=fall*m.a*I*tw;
        if(a<0.01) continue;
        ctx.globalAlpha=a;
        ctx.fillStyle='rgba(248,244,232,1)';
        ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,6.283); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
