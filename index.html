<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;cursor:none;touch-action:none}
  #fl{position:fixed;inset:0;display:block;z-index:1}

  /* metadata hidden in the dark — a soft radial mask reveals only what the beam touches */
  #meta{
    position:fixed; left:50%; top:60%; transform:translate(-50%,-50%);
    z-index:8; pointer-events:none; text-align:center;
    display:flex; flex-direction:column; align-items:center;
    font-family:'JetBrains Mono',monospace; color:#f1ead9; opacity:0;
    text-shadow:0 0 10px rgba(255,238,205,.45);
    -webkit-mask-image:radial-gradient(circle var(--mr,0px) at var(--mx,-9999px) var(--my,-9999px), #000 55%, transparent 100%);
    mask-image:radial-gradient(circle var(--mr,0px) at var(--mx,-9999px) var(--my,-9999px), #000 55%, transparent 100%);
  }
  #cover{width:108px;height:108px;object-fit:cover;border-radius:7px;margin-bottom:18px;
    box-shadow:0 0 26px rgba(255,238,205,.18); display:none}
  #meta .np{font-size:10px;font-weight:300;letter-spacing:.42em;text-transform:lowercase;opacity:.7;margin-bottom:10px}
  #meta .title{font-size:19px;font-weight:400;letter-spacing:.04em;text-transform:lowercase}
  #meta .artist{font-size:12px;font-weight:300;letter-spacing:.18em;text-transform:lowercase;opacity:.75;margin-top:6px}

  /* landing page */
  #landing{position:fixed;inset:0;z-index:100;background:#fff;cursor:none;overflow:hidden;will-change:transform;
    -webkit-mask-image:radial-gradient(circle var(--hr,0px) at var(--hx,50%) var(--hy,50%), transparent 0%, transparent 86%, #000 100%);
    mask-image:radial-gradient(circle var(--hr,0px) at var(--hx,50%) var(--hy,50%), transparent 0%, transparent 86%, #000 100%);}
  #land{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="fl"></canvas>
<audio id="bgm" preload="auto"></audio>
<div id="meta">
  <img id="cover" alt="">
  <div class="np">now playing</div>
  <div class="title">—</div>
  <div class="artist"></div>
</div>
<div id="landing"><canvas id="land"></canvas></div>
<script>
const cv=document.getElementById('fl'), ctx=cv.getContext('2d');
let W,H,DPR=Math.min(devicePixelRatio||1,2);
let tx,ty,x,y, Rcur=120;

function makeSprite(r,g,b){
  const s=128, c=document.createElement('canvas'); c.width=c.height=s;
  const o=c.getContext('2d'), grd=o.createRadialGradient(64,64,0,64,64,64);
  grd.addColorStop(0,`rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.45,`rgba(${r},${g},${b},0.55)`);
  grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  o.fillStyle=grd; o.fillRect(0,0,s,s); return c;
}
const darkBlob=makeSprite(0,0,0), brightBlob=makeSprite(255,244,224);

/* persistent patches — fewer, softer, larger => less "cloudy", just gentle unevenness */
let cells=[];
function makeCell(){
  const ang=Math.random()*6.283, dist=Math.random()*Rcur*0.7;
  return {
    ox:Math.cos(ang)*dist, oy:Math.sin(ang)*dist,
    vx:(Math.random()-.5)*Rcur*0.0004, vy:(Math.random()-.5)*Rcur*0.0004,
    r:Rcur*(0.25+Math.random()*0.5), sx:0.7+Math.random()*0.7, sy:0.7+Math.random()*0.7,
    rot:Math.random()*6.283, spin:(Math.random()-.5)*0.0009,
    baseA:0.045+Math.random()*0.08,
    freq:0.08+Math.random()*0.30, phase:Math.random()*6.283,
    dark:Math.random()<0.6
  };
}
function initCells(){ cells=Array.from({length:34},makeCell); }

/* tiny world-space dust: floats in the air, only catches light inside the beam */
let motes=[];
function makeMote(){
  return { x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*0.05, vy:(Math.random()-.5)*0.05-0.008,  // slow, faint upward drift
    r:0.8+Math.random()*0.9,
    a:0.26+Math.random()*0.28, tf:0.8+Math.random()*2.6, tp:Math.random()*6.283 };
}
function initMotes(){ motes=Array.from({length:Math.min(180,Math.floor(W*H/6500))},makeMote); }

function resize(){
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  Rcur=Math.min(W,H)*0.0675;
  initCells(); initMotes();
}
addEventListener('resize',resize); resize();
tx=x=W/2; ty=y=H/2;

let masterOn=true, down=null, entered=false;
addEventListener('pointermove',e=>{ tx=e.clientX; ty=e.clientY; });
addEventListener('pointerdown',e=>{ tx=e.clientX; ty=e.clientY; if(entered) down={x:e.clientX,y:e.clientY,t:performance.now()}; });
addEventListener('pointerup',e=>{
  if(!entered||!down)return;
  const dt=performance.now()-down.t, d=Math.hypot(e.clientX-down.x,e.clientY-down.y);
  if(dt<300 && d<10){ masterOn=!masterOn; if(masterOn){ state='on'; blackoutUntil=0; } }
  down=null;
});
addEventListener('touchmove',e=>{ if(e.touches[0]){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; } e.preventDefault(); },{passive:false});

/* ---- random playlist + ID3 metadata ---- */
// add your files here (they sit next to this html file); names can be anything
const playlist = ["Juice WRLD - Narcs.mp3","Juice WRLD - Never Switch.mp3"];
const bgm=document.getElementById('bgm');
const elTitle=document.querySelector('#meta .title'), elArtist=document.querySelector('#meta .artist');
let current=-1;

function fileName(u){ try{ return decodeURIComponent(u.split('/').pop().replace(/\.[^.]+$/,'')); }catch(e){ return u; } }
function setMeta(title,artist){ elTitle.textContent=(title||'untitled').toLowerCase(); elArtist.textContent=(artist||'').toLowerCase(); }
function loadMeta(url){
  const cover=document.getElementById('cover');
  if(window.jsmediatags){
    jsmediatags.read(url,{
      onSuccess:t=>{
        const g=(t&&t.tags)||{};
        setMeta(g.title||fileName(url), g.artist||'');
        if(g.picture && g.picture.data && g.picture.data.length){
          try{
            const d=g.picture.data; let bin='';
            for(let i=0;i<d.length;i++) bin+=String.fromCharCode(d[i]);
            cover.src='data:'+(g.picture.format||'image/jpeg')+';base64,'+btoa(bin);
            cover.style.display='block';
          }catch(e){ cover.style.display='none'; }
        } else cover.style.display='none';
      },
      onError:()=>{ setMeta(fileName(url),''); cover.style.display='none'; }
    });
  } else { setMeta(fileName(url),''); cover.style.display='none'; }
}
function playRandom(){
  if(!playlist.length) return;
  let i=Math.floor(Math.random()*playlist.length);
  if(playlist.length>1) while(i===current) i=Math.floor(Math.random()*playlist.length); // no immediate repeat
  current=i;
  bgm.src=playlist[i];
  bgm.play().catch(()=>{});
  loadMeta(bgm.src);
}
bgm.addEventListener('ended', playRandom);   // when a track finishes, pick another at random

let intensity=1, target=1, state='on', blackoutUntil=0, recovery=[], recIdx=0, recUntil=0;
function buildRecovery(){
  recovery=[{d:70,v:0},{d:55,v:.85},{d:45,v:0},{d:80,v:0},{d:40,v:1},
            {d:65,v:.12},{d:35,v:.9},{d:100,v:0},{d:45,v:1},{d:55,v:.35},{d:40,v:1}];
  recIdx=0; recUntil=performance.now()+recovery[0].d;
}
function updateFlicker(now,t){
  if(!masterOn){ intensity+=(0-intensity)*0.5; return; }
  const breathe=1+Math.sin(t*1.3)*0.014;
  if(state==='on'){
    target=breathe;
    if(Math.random()<0.05) target=breathe*(0.78+Math.random()*0.18);
    if(Math.random()<0.012) target=breathe*(0.45+Math.random()*0.25);
    if(Math.random()<0.0005){ state='black'; blackoutUntil=now+(500+Math.random()*900); }
    intensity+=(target-intensity)*0.45;
  } else if(state==='black'){
    target=Math.random()<0.06?0.04:0.0; intensity+=(target-intensity)*0.6;
    if(now>blackoutUntil){ state='recover'; buildRecovery(); }
  } else {
    target=recovery[recIdx].v; intensity+=(target-intensity)*0.7;
    if(now>recUntil){ recIdx++; if(recIdx>=recovery.length) state='on'; else recUntil=now+recovery[recIdx].d; }
  }
  if(intensity<0)intensity=0;
}

function loop(now){
  const t=now/1000;
  updateFlicker(now,t);

  x+=(tx-x)*0.16; y+=(ty-y)*0.16;
  const shx=Math.sin(t*6.1)*0.7+Math.sin(t*11.3)*0.35;
  const shy=Math.cos(t*5.4)*0.7+Math.cos(t*9.7)*0.35;
  const lx=x+shx, ly=y+shy;

  // reveal the hidden metadata only where the beam falls across it (after entering)
  if(entered){
    const meta=document.getElementById('meta'), mr=meta.getBoundingClientRect();
    meta.style.setProperty('--mx',(lx-mr.left)+'px');
    meta.style.setProperty('--my',(ly-mr.top)+'px');
    meta.style.setProperty('--mr',(Rcur*1.5)+'px');
    meta.style.opacity=Math.max(0,intensity);
  }

  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  const I=intensity;
  if(I>0.004){
    const R=Rcur*(0.92+0.08*I);

    // ---- global illumination: a far, very faint halo that lifts the surroundings
    // so the beam bleeds into the dark instead of ending at a hard edge ----
    const HR=Rcur*5.0;
    const h=ctx.createRadialGradient(lx,ly,R*0.5, lx,ly,HR);
    h.addColorStop(0.00,`rgba(214,220,234,${0.075*I})`);
    h.addColorStop(0.16,`rgba(196,206,224,${0.042*I})`);
    h.addColorStop(0.38,`rgba(170,182,210,${0.020*I})`);
    h.addColorStop(0.62,`rgba(150,166,200,${0.008*I})`);
    h.addColorStop(0.84,`rgba(130,150,190,${0.0025*I})`);
    h.addColorStop(1.00,'rgba(120,140,180,0)');
    ctx.fillStyle=h; ctx.fillRect(0,0,W,H);

    // ---- the small focused beam: centralized soft core, dim, gentle uneven falloff ----
    const g=ctx.createRadialGradient(lx,ly,0, lx,ly,R);
    g.addColorStop(0.00,`rgba(250,242,226,${0.50*I})`);
    g.addColorStop(0.10,`rgba(249,240,222,${0.44*I})`);
    g.addColorStop(0.22,`rgba(244,236,218,${0.34*I})`);
    g.addColorStop(0.36,`rgba(230,230,222,${0.24*I})`);
    g.addColorStop(0.52,`rgba(206,212,222,${0.15*I})`);
    g.addColorStop(0.70,`rgba(176,188,212,${0.075*I})`);
    g.addColorStop(0.86,`rgba(152,168,202,${0.03*I})`);
    g.addColorStop(1.00,'rgba(120,140,180,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    for(const c of cells){
      c.ox+=c.vx; c.oy+=c.vy; c.rot+=c.spin;
      let dist=Math.hypot(c.ox,c.oy);
      if(dist>R*0.8){ c.vx-=(c.ox/dist)*Rcur*0.00003; c.vy-=(c.oy/dist)*Rcur*0.00003; }
      c.vx*=0.999; c.vy*=0.999;
      const edge=1-(dist/R)*0.7;
      const mod=0.65+0.35*Math.sin(t*c.freq+c.phase);
      const a=c.baseA*edge*mod*I;
      if(a<=0) continue;
      const w=2*c.r*c.sx, h2=2*c.r*c.sy;
      ctx.save();
      ctx.globalCompositeOperation=c.dark?'source-over':'lighter';
      ctx.globalAlpha=c.dark?a*0.7:a*0.7;
      ctx.translate(lx+c.ox,ly+c.oy); ctx.rotate(c.rot);
      ctx.drawImage(c.dark?darkBlob:brightBlob,-w/2,-h2/2,w,h2);
      ctx.restore();
    }

    // tiny dust drifting in the air, lit only where the beam reaches it
    ctx.globalCompositeOperation='lighter';
    const spill=R*1.2;
    for(const m of motes){
      const ang=(Math.sin(m.x*0.0016+t*0.12)+Math.cos(m.y*0.0016-t*0.09))*Math.PI;
      m.vx+=Math.cos(ang)*0.0018+(Math.random()-.5)*0.0016;
      m.vy+=Math.sin(ang)*0.0018+(Math.random()-.5)*0.0016-0.0013;  // gentle buoyant float
      m.vx*=0.965; m.vy*=0.965;
      const sp=Math.hypot(m.vx,m.vy); if(sp>0.16){ m.vx*=0.16/sp; m.vy*=0.16/sp; }
      m.x+=m.vx; m.y+=m.vy;
      if(m.x<0)m.x+=W; else if(m.x>W)m.x-=W;
      if(m.y<0)m.y+=H; else if(m.y>H)m.y-=H;
      const dx=m.x-lx, dy=m.y-ly, d=Math.hypot(dx,dy);
      if(d<spill){
        const f=1-d/spill, fall=Math.pow(f,0.8);
        const tw=0.7+0.3*Math.sin(t*m.tf+m.tp);
        const a=fall*m.a*I*tw;
        if(a<0.01) continue;
        ctx.globalAlpha=a;
        ctx.fillStyle='rgba(248,244,232,1)';
        ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,6.283); ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ===== landing page: a wall of "click.me" that scrambles around the cursor ===== */
const landing=document.getElementById('landing'), land=document.getElementById('land'), lctx=land.getContext('2d');
const UNIT="click.me.";
const GLY="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*<>/|=+-?";
let LW,LH,FS,cellW,cellH,cols,rows,mx2,my2,RAD,prevBox=null,landRAF,trans=null;

function charAt(r,c){ const n=UNIT.length; return UNIT[((r*cols+c)%n+n)%n]; }
function drawBase(x0,y0,x1,y1){
  x0=Math.max(0,x0); y0=Math.max(0,y0); x1=Math.min(LW,x1); y1=Math.min(LH,y1);
  if(x1<=x0||y1<=y0) return;
  lctx.fillStyle='#fff'; lctx.fillRect(x0,y0,x1-x0,y1-y0);
  lctx.fillStyle='#141414'; lctx.font=FS+"px monospace"; lctx.textBaseline='top';
  const c0=Math.floor(x0/cellW),c1=Math.ceil(x1/cellW),r0=Math.floor(y0/cellH),r1=Math.ceil(y1/cellH);
  for(let r=r0;r<r1;r++) for(let c=c0;c<c1;c++) lctx.fillText(charAt(r,c), c*cellW, r*cellH);
}
function landSetup(){
  LW=innerWidth; LH=innerHeight;
  land.width=LW*DPR; land.height=LH*DPR; land.style.width=LW+'px'; land.style.height=LH+'px';
  lctx.setTransform(DPR,0,0,DPR,0,0);
  FS=13; lctx.font=FS+"px monospace"; lctx.textBaseline='top';
  cellW=lctx.measureText('m').width||FS*0.6; cellH=Math.round(FS*1.18);
  cols=Math.ceil(LW/cellW); rows=Math.ceil(LH/cellH);
  RAD=Math.max(46, Math.min(LW,LH)*0.07);
  if(mx2==null){ mx2=LW/2; my2=LH/2; }
  prevBox=null; drawBase(0,0,LW,LH);
}
function landFrame(){
  if(entered) return;                                  // fully stop once we've entered
  if(trans){ landTrans(); if(!entered) landRAF=requestAnimationFrame(landFrame); return; }
  const tm=performance.now()/1000, MAXR=RAD*1.5;
  const cur={x0:mx2-MAXR-cellW,y0:my2-MAXR-cellH,x1:mx2+MAXR+cellW,y1:my2+MAXR+cellH};
  const box=prevBox?{x0:Math.min(cur.x0,prevBox.x0),y0:Math.min(cur.y0,prevBox.y0),
                     x1:Math.max(cur.x1,prevBox.x1),y1:Math.max(cur.y1,prevBox.y1)}:cur;
  drawBase(box.x0,box.y0,box.x1,box.y1);
  const c0=Math.max(0,Math.floor((mx2-MAXR)/cellW)), c1=Math.min(cols,Math.ceil((mx2+MAXR)/cellW));
  const r0=Math.max(0,Math.floor((my2-MAXR)/cellH)), r1=Math.min(rows,Math.ceil((my2+MAXR)/cellH));
  for(let r=r0;r<r1;r++) for(let c=c0;c<c1;c++){
    const dx=c*cellW+cellW/2-mx2, dy=r*cellH+cellH/2-my2, dist=Math.hypot(dx,dy);
    const ang=Math.atan2(dy,dx);
    // wobbly, animated edge + per-cell flicker => jagged/glitchy boundary
    const effR=RAD*(0.85+0.15*Math.sin(ang*6+tm*4)+0.10*Math.sin(ang*11-tm*2.7))+(Math.random()-0.5)*9;
    if(dist<effR){
      lctx.fillStyle='#fff'; lctx.fillRect(c*cellW,r*cellH,cellW+0.6,cellH);
      lctx.fillStyle='#141414'; lctx.fillText(GLY[(Math.random()*GLY.length)|0], c*cellW, r*cellH);
    }
  }
  prevBox=cur; landRAF=requestAnimationFrame(landFrame);
}
function landTrans(){
  const p=Math.min(1,(performance.now()-trans.t0)/trans.dur), e=p*p;   // slow start, then rush in
  const diag=Math.hypot(LW,LH);
  // open a hole at the click point that instantly shows the live flashlight, then grows
  landing.style.setProperty('--hx',trans.cx+'px');
  landing.style.setProperty('--hy',trans.cy+'px');
  landing.style.setProperty('--hr',(85+e*diag*1.3)+'px');
  landing.style.transformOrigin=trans.cx+'px '+trans.cy+'px';
  landing.style.transform='scale('+(1+e*0.5)+')';
  if(p>=1){ entered=true; landing.style.display='none'; }   // beam was already tracking — no snap needed
}
function enterScene(px,py){ if(trans||entered) return; playRandom(); trans={cx:px,cy:py,t0:performance.now(),dur:2600}; }

addEventListener('pointermove',e=>{ if(!entered){ mx2=e.clientX; my2=e.clientY; } });
addEventListener('touchmove',e=>{ if(!entered && e.touches[0]){ mx2=e.touches[0].clientX; my2=e.touches[0].clientY; } },{passive:false});
landing.addEventListener('pointerdown',e=>{ enterScene(e.clientX,e.clientY); });
addEventListener('resize',()=>{ if(!entered) landSetup(); });
landSetup(); landFrame();
</script>
</body>
</html>
